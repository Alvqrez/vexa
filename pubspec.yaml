name: vexa_finance
description: "Premium personal finance management — track smarter, live better."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  google_fonts: ^6.2.1
  intl: ^0.20.2
  fl_chart: ^0.69.0
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.4
  uuid: ^4.5.0
  image_picker: ^1.1.2
  flutter_secure_storage: ^9.2.2
  crypto: ^3.0.3
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.1
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.9

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#09090F"
  adaptive_icon_foreground: "assets/icon/icon.png"
  web:
    generate: true
    image_path: "assets/icon/icon.png"
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
  macos:
    generate: true
    image_path: "assets/icon/icon.png"

flutter_native_splash:
  color: "#09090F"
  image: assets/icon/icon.png
  android: true
  ios: true
  web: false
  android_12:
    color: "#09090F"
    image: assets/icon/icon.png
    icon_background_color: "#09090F"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
